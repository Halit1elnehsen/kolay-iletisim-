name: kolay_iletisim
description: "SpeakBridge - Turist Sesli Çeviri Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Ses - Konuşma tanıma ve metin-ses dönüşümü
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # AI - Gemini çeviri
  google_generative_ai: ^0.4.7

  # Konfigürasyon
  flutter_dotenv: ^5.1.0

  # State Management
  provider: ^6.1.2

  # Navigasyon
  go_router: ^13.2.0

  # Yerel Depolama
  shared_preferences: ^2.2.3

  # İzinler
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts: []